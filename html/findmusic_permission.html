<!doctype html>
<html>
  <head>
    <title>FindMusic.club Permission Request</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
        line-height: 1.6;
      }
      h1 {
        color: #1da0c3;
        font-size: 24px;
      }
      .message {
        background: #f5f5f5;
        border-left: 4px solid #1da0c3;
        padding: 15px;
        margin: 20px 0;
      }
      button {
        background: #1da0c3;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #158ba8;
      }
      #status {
        margin-top: 20px;
        font-style: italic;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>FindMusic.club Permission</h1>
    <div class="message">
      <p>To log in to FindMusic.club, we need permission to read your Bandcamp cookie.</p>
      <p>Your Bandcamp credentials are only used to create a secure login token and are never stored.</p>
    </div>
    <button id="grant-permission">Grant Permission</button>
    <div id="status"></div>
    <script src="../dist/findmusic_permission.js"></script>
  </body>
</html>
